# nav2 阶段一 costmap 参数 —— 仅验证 costmap，不含 planner/controller。
# 可配置原则（spec §2）：障碍层插件 / 障碍源话题 / 高度阈值都在本文件，切换不改代码。
#   - 切障碍源：改 local_costmap.voxel_layer.pointcloud.topic（默认 /points_raw，可改 /cloud_registered）
#   - 切 STVL：把 plugins 的 voxel_layer 换成 spatio_temporal_voxel_layer 插件块（见 README 备选块），并 apt 装包
# footprint / 高度阈值为暂定值，build 机按实际模型与雷达高度调（见 plan Task 7）。

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # 由 launch 的 map 参数覆盖

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: false
      track_unknown_space: true
      footprint: "[ [0.45, 0.28], [0.45, -0.28], [-0.45, -0.28], [-0.45, 0.28] ]"
      resolution: 0.05
      # 仅静态先验图 + 膨胀（spec §13 故意不加实时障碍层；动态障碍交给 local costmap）
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: camera_init        # odom 角色：局部平滑、不随 gicp 跳变（spec §7）
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[ [0.45, 0.28], [0.45, -0.28], [-0.45, -0.28], [-0.45, 0.28] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /points_raw            # 默认原始 velodyne 系云（光迹清除原点正确）
          sensor_frame: "velodyne"      # 显式指定传感器系，供光迹清除取原点
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.1      # 滤地面（build 机按雷达离地高度调）
          max_obstacle_height: 2.0
          obstacle_max_range: 20.0
          obstacle_min_range: 0.9       # 匹配 VLP-16 min_range=0.9，避免近距盲区误清/误标
          raytrace_max_range: 25.0
          raytrace_min_range: 0.9       # 同上：不在 <0.9m 盲锥内光迹清除
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true
