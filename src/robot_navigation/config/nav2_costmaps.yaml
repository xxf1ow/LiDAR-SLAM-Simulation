# nav2 阶段一 costmap 参数 —— planner_server(托管 global_costmap) / controller_server(托管 local_costmap)。
# 可配置原则（spec §2）：障碍层插件 / 障碍源话题 / 高度阈值都在本文件，切换不改代码。
#   - 障碍源用 /cloud_registered(camera_init 系，FAST-LIO 配准好)。勿用 /points_raw——
#     body→base_footprint 焊接为单位旋转后，velodyne 的 URDF TF 链会随车转歪、刷出假障碍(见调试记录)。
#   - 切 STVL：用现成的 nav2_costmaps_stvl.yaml（启动加 params_file:=...），无需手改本文件；详见 README
# footprint / 高度阈值为暂定值，build 机按实际模型与雷达高度调（见 plan Task 7）。

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # 由 launch 的 map 参数覆盖

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: false
      track_unknown_space: true
      footprint: "[ [0.45, 0.28], [0.45, -0.28], [-0.45, -0.28], [-0.45, 0.28] ]"
      resolution: 0.05
      # 仅静态先验图 + 膨胀（故意不加实时障碍层；动态障碍交给 local costmap）
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5      # 调缓(原 3.0)：代价梯度更平展，全局路径偏向通道中央而非贴墙
        inflation_radius: 0.55
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: camera_init        # odom 角色：局部平滑、不随 gicp 跳变（spec §7）
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[ [0.45, 0.28], [0.45, -0.28], [-0.45, -0.28], [-0.45, 0.28] ]"
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: -1.0                # 体素栅格下探，含传感器原点 body(camera_init 系 z≈0，略负)
        z_resolution: 0.1             # 否则 "Sensor origin out of map bounds"，无法光迹清除→车假性卡死
        z_voxels: 30                  # -1.0 .. +2.0，覆盖传感器原点 + 到 2m 障碍
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /cloud_registered      # FAST-LIO 已配准到 camera_init 的云；不走 velodyne TF 链
          sensor_frame: "body"          # 光迹清除原点取 FAST-LIO body(≈雷达，camera_init 子帧)
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.1      # 滤地面（build 机按雷达离地高度调）
          max_obstacle_height: 2.0
          obstacle_max_range: 20.0
          obstacle_min_range: 0.9       # 匹配 VLP-16 min_range=0.9，避免近距盲区误清/误标
          raytrace_max_range: 25.0
          raytrace_min_range: 0.9       # 同上：不在 <0.9m 盲锥内光迹清除
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5      # 调缓(原 3.0)：障碍代价向外铺得更远，DWB 提前减速、不贴障碍走
        inflation_radius: 1.0         # 加宽(原 0.55)：standoff 超出 ~0.9m 盲区，障碍仍可见时就停住→可靠 stop-and-wait
      always_send_full_costmap: true

# ── 以下两块：服务器托管 costmap 所需（nav2 官方规范配置）────────────────
# planner_server 托管 global_costmap、controller_server 托管 local_costmap。
# 阶段一不发目标点 → 这些 planner/controller 插件加载后空转、不运行、不发 cmd_vel。
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /odom          # 取 diff_drive 真实 twist(FAST-LIO /Odometry twist 恒零)；spec §5
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 30.0   # 放宽(原 10)：stop-and-wait 等移动障碍通过时，别太快判失败触发恢复
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 1.0         # 线速度上限(原 0.26 TB3 级，偏慢)；抖动模型别给太猛，可再上调
      max_vel_y: 0.0
      max_vel_theta: 1.5     # 转向角速度上限；想转更快就调大(如 1.5)
      min_speed_xy: 0.0
      max_speed_xy: 1.0      # 必须 ≥ max_vel_x，否则被钳住
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.1        # 提高(原 0.02 近乎不顾障碍代价)：让膨胀梯度真正影响轨迹打分→保距+提前停
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
