# nav2 costmap 参数 —— STVL 版（local_costmap 用 spatio_temporal_voxel_layer 替代内置 voxel_layer）。
# 用法（不改任何文件，启动时切换）：
#   sudo apt install ros-humble-spatio-temporal-voxel-layer
#   ros2 launch robot_navigation stage2_navigation.launch.py map:=~/result/map.yaml \
#       params_file:=<install 后的 share>/robot_navigation/config/nav2_costmaps_stvl.yaml
# 与默认 nav2_costmaps.yaml 的唯一结构差异：local_costmap 的障碍层。其余各段须逐字一致
# （由 test_costmaps_stvl_sync.py 把关，改主 yaml 共享参数时同步改本文件）。
#
# 阶段三修复：观测源 /points_raw → /cloud_registered_body（FAST-LIO body 系当帧去畸变云）。
#   为什么不用 raw：/points_raw 须经 URDF TF 链(velodyne→…→map)变换，链中 velodyne 姿态与
#   SDF 实际安装不一致 → 点在 map 系落错位置(随车头旋转，阶段二实测)。/cloud_registered_body
#   只走 SLAM 链(body→camera_init→map)，且 frame=body 与雷达原点仅差 1cm(extrinsic_T z=-0.0103)，
#   STVL 视锥清除原点正确。清除模型参数(voxel_decay/decay_acceleration/FOV)属经验值，实测调。

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # 由 launch 的 map 参数覆盖

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: false
      track_unknown_space: true
      footprint: "[ [0.45, 0.28], [0.45, -0.28], [-0.45, -0.28], [-0.45, 0.28] ]"
      resolution: 0.05
      # 仅静态先验图 + 膨胀（故意不加实时障碍层；动态障碍交给 local costmap）
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: camera_init        # odom 角色：局部平滑、不随 gicp 跳变（spec §7）
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[ [0.45, 0.28], [0.45, -0.28], [-0.45, -0.28], [-0.45, 0.28] ]"
      plugins: ["stvl_layer", "inflation_layer"]
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 20.0            # 体素衰减时间(秒，linear)；STVL 靠时间衰减做动态清除，比 raytrace 鲁棒
        decay_model: 0               # 0=linear 1=exponential 2=persistent
        voxel_size: 0.05
        track_unknown_space: true
        max_obstacle_height: 2.0
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1        # 1=max 0=override
        origin_z: 0.0
        publish_voxel_map: true
        transform_tolerance: 0.2
        mapping_mode: false
        map_save_duration: 60.0
        # 观测源：/cloud_registered_body（frame=body，FAST-LIO 发布，scan_bodyframe_pub_en 默认开）。
        # mark 与 clear 共用同一话题：mark 标记占据，clear 按 3D Lidar 视锥(model_type 1)做时间加速衰减。
        observation_sources: pointcloud_mark pointcloud_clear
        pointcloud_mark:
          data_type: PointCloud2
          topic: /cloud_registered_body
          marking: true
          clearing: false
          min_obstacle_height: 0.1     # 滤地面（build 机按雷达离地高度调）
          max_obstacle_height: 2.0
          expected_update_rate: 0.0    # 0.0=不做超时检查（非频率限制；源停发也不报错）
          observation_persistence: 0.0
          inf_is_valid: false
          clear_after_reading: true
          filter: "voxel"
          voxel_min_points: 0
        pointcloud_clear:
          data_type: PointCloud2
          topic: /cloud_registered_body
          marking: false
          clearing: true
          min_z: 0.1
          max_z: 2.0
          vertical_fov_angle: 0.5236   # VLP-16 垂直 FOV 30° = 0.5236 rad
          horizontal_fov_angle: 6.2832 # 360° = 2π rad
          decay_acceleration: 5.0      # 清除加速度，build 机按清除快慢调
          model_type: 1                # 1=3D Lidar（本项目是 velodyne，非深度相机）
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

# ── 以下两块与默认 nav2_costmaps.yaml 完全相同（服务器托管 costmap 所需）──────────
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /odom          # 取 diff_drive 真实 twist(FAST-LIO /Odometry twist 恒零)；spec §5
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 1.0         # 线速度上限(原 0.26 TB3 级，偏慢)；抖动模型别给太猛，可再上调
      max_vel_y: 0.0
      max_vel_theta: 1.5     # 转向角速度上限；想转更快就调大(如 1.5)
      min_speed_xy: 0.0
      max_speed_xy: 1.0      # 必须 ≥ max_vel_x，否则被钳住
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
