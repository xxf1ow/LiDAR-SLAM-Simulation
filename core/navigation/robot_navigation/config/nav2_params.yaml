# 5e Nav2 最小打通参数。frame: 全局 costmap=map；局部 costmap+behavior=camera_init(连续、不随 GICP 跳变)。
# 障碍源 /cloud_registered(sensor_frame=body)。odom_topic=/base_controller/odom(diff_drive 真实 twist;
# FAST-LIO /Odometry twist 恒零)。值多取自 nav2 Humble 官方默认 + 旧栈实测，构建机按 spec §9 再调。
#
# === CHASSIS-DEPENDENT（换底盘改这里）===
#   planner_server.GridBased: minimum_turning_radius / motion_model_for_search
#   controller_server.FollowPath: motion_model / vx_max / vx_min / wz_max / AckermannConstraints.min_turning_r
#   global_costmap & local_costmap: footprint
#   behavior_server: spin/backup 为原地机动，不能原地转的底盘需复审(spin→drive_on_heading 式)
# ==========================================

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""   # 由 launch 的 map 参数覆盖(OpaqueFunction expanduser)

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.25
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"   # CHASSIS: 差速近似(可倒车);阿克曼可 DUBIN/RS
      minimum_turning_radius: 0.2              # CHASSIS: 差速给小值;换车填实车最小转弯半径
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0          # 提高→更躲障碍走中央(居中主力仍是 inflation)
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true

controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /base_controller/odom    # diff_drive 真实 twist(FAST-LIO /Odometry twist 恒零)
    controller_frequency: 10.0           # WSL 软渲下 20Hz 算不过来(missed rate)。MPPI 强约束:周期≤model_dt,
                                         # 故降频必须同步抬 model_dt(此处 1/10=0.1=model_dt)。再紧可继续等比降。
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 30           # 降算力(horizon = time_steps*model_dt = 30*0.1 = 3.0s)
      model_dt: 0.1            # = 1/controller_frequency(MPPI 约束:周期≤model_dt)
      batch_size: 1000          # 2000→1000 降算力(WSL 软渲算力紧);再紧可降到 500
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.6               # 0.4→0.6 多探索转向样本,改善弯道边走边转
      vx_max: 1.0               # CHASSIS: 0.5→1.0 提速(≤底盘 1.5)
      vx_min: -0.35             # CHASSIS
      vy_max: 0.5
      wz_max: 1.8               # CHASSIS: 1.0→1.8 治弯道爬行(≤底盘 2.0);紧弯 vx=wz·r 不再被钳死
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive" # CHASSIS: 换车 Ackermann/Omni
      visualize: false
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2      # CHASSIS: 仅 motion_model=Ackermann 时生效
      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0   # 提高→更躲障碍走中央
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        forward_preference: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: false
      track_unknown_space: true
      footprint: "[ [0.375, 0.275], [0.375, -0.275], [-0.375, -0.275], [-0.375, 0.275] ]"  # CHASSIS: 本车 0.75x0.55
      resolution: 0.05
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5      # 调缓→代价梯度平展,全局路径偏通道中央
        inflation_radius: 0.55
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: camera_init        # 连续、不随 GICP 跳变(spec §4.4 / 前提②)
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[ [0.375, 0.275], [0.375, -0.275], [-0.375, -0.275], [-0.375, 0.275] ]"  # CHASSIS
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: -1.0                # 下探含传感器原点 body(camera_init 系 z≈0,略负);否则 Sensor origin out of map bounds
        z_resolution: 0.1
        z_voxels: 30                  # -1.0 .. +2.0
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /cloud_registered
          sensor_frame: "body"
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
          obstacle_max_range: 20.0
          obstacle_min_range: 0.9
          raytrace_max_range: 25.0
          raytrace_min_range: 0.9
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5      # 障碍代价外铺更远,MPPI 提前保距、走中央
        inflation_radius: 1.0         # standoff 超出 ~0.9m 盲区
      always_send_full_costmap: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: camera_init      # CHASSIS-邻接: spin/backup 在此系做里程闭环
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /base_controller/odom
    bt_loop_duration: 20         # 10→20(50Hz):软渲下 100Hz tick 跟不上的告警降频
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # 不显式设 BT XML → 用内置默认(navigate_to_pose/through_poses 的 *_w_replanning_and_recovery 树)
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
